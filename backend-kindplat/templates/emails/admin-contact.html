<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact Inquiry</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 30px;
            border: 1px solid #ddd;
        }
        .header {
            background-color: #4A90E2;
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            margin: -30px -30px 30px -30px;
            text-align: center;
        }
        .info-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ccc;
        }
        .label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }
        .message-box {
            background-color: #fff;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-top: 10px;
            white-space: pre-wrap;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Contact Inquiry 📬</h2>
        </div>
        
        <div class="info-item">
            <span class="label">From:</span>
            <span>{{fullName}}</span>
        </div>
        
        <div class="info-item">
            <span class="label">Email:</span>
            <span><a href="mailto:{{userEmail}}">{{userEmail}}</a></span>
        </div>
        
        <div class="info-item">
            <span class="label">Message:</span>
            <div class="message-box">{{message}}</div>
        </div>
        
        <div class="footer">
            <p>Sent from the Kire Platform Contact Form</p>
            <p>&copy; {{year}} Kire. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
