# version: '3.8'

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-kire1980}
    ports:
      - "${DATABASE_PORT}:27017"
    volumes:
      - db_data:/data/db
      - db_config:/data/configdb
    networks:
      - blog_network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin}
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8080:8081"
    depends_on:
      - mongodb
    networks:
      - blog_network
    restart: unless-stopped

  # redis:
  #   image: redis:7.0-alpine
  #   container_name: redis_cache
  #   ports:
  #     - "6379:6379"
  #     - "16379:16379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - blog_network
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis_cache
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis-stack:/var/lib/redis-stack
    environment:
      # Redis configuration arguments
      # - save 60 1: RDB snapshot every 60s if at least 1 key changed
      # - maxmemory 256mb: Memory limit for cache
      # - maxmemory-policy noeviction: Don't evict keys when memory full (required for BullMQ)
      # - appendonly yes: Enable AOF persistence for durability
      - REDIS_ARGS=--save 60 1 --maxmemory 256mb --maxmemory-policy noeviction --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - mongodb
    networks:
      - blog_network
  # RabbitMQ - Uncomment if you need message broker for microservices
  # rabbitmq:
  #   image: rabbitmq:3.11-management-alpine
  #   container_name: rabbitmq_broker
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   networks:
  #     - blog_network

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blog_network
    restart: unless-stopped

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - blog_network
    restart: unless-stopped

  # Grafana - Monitoring and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - blog_network
    restart: unless-stopped

networks:
  blog_network:
    driver: bridge

volumes:
  db_data:
  db_config:
  redis-stack:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  loki_data:
  grafana_data:
